syntax = "proto3";

package auth;

option go_package = "github.com/Ridit07/hiremind-proto-contracts/generated;generated";

service AuthService {
  rpc Signup (SignupRequest) returns (SignupResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
}

message SignupRequest {
  string email = 1;
  string password = 2;
  string user_type = 3;
  string phone_number = 4;
}

message SignupResponse {
  string message = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
}